apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-frontend-app
  labels:
    app: java-frontend-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-frontend-app
  template:
    metadata:
      labels:
        app: java-frontend-app
    spec:
      containers:
        - name: java-frontend-app
          image: 768571909004.dkr.ecr.ap-south-1.amazonaws.com/java-app:BUILD_NUMBER_PLACEHOLDER
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
